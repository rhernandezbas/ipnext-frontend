name: Deploy ipnext-frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ipnext-frontend:latest .

      - name: Deploy container
        run: |
          docker stop ipnext-new-frontend 2>/dev/null || true
          docker rm ipnext-new-frontend 2>/dev/null || true
          docker run -d \
            --name ipnext-new-frontend \
            --restart unless-stopped \
            -p 7778:80 \
            ipnext-frontend:latest

      - name: Verify
        run: |
          sleep 5
          docker ps | grep ipnext-new-frontend
