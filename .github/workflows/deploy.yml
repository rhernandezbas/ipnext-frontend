name: Deploy ipnext-frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ipnext-frontend:latest .

      - name: Deploy container
        run: |
          set -e
          docker network create ipnext-net 2>/dev/null || true
          # Force-remove old container (stop+rm in one). Fail loud if it can't.
          docker rm -f ipnext-new-frontend 2>/dev/null || true
          docker run -d \
            --name ipnext-new-frontend \
            --network ipnext-net \
            --restart unless-stopped \
            -p 7778:80 \
            ipnext-frontend:latest

      - name: Verify
        run: |
          set -e
          sleep 5
          docker ps | grep ipnext-new-frontend
          # Verify the container image SHA matches the freshly built :latest tag.
          # Catches the case where stop/rm silently failed and an old container
          # (with the previous image) keeps running. Same fix as backend after
          # the change-1 incident.
          CONTAINER_IMG=$(docker inspect ipnext-new-frontend --format '{{.Image}}')
          LATEST_IMG=$(docker inspect ipnext-frontend:latest --format '{{.Id}}')
          if [ "$CONTAINER_IMG" != "$LATEST_IMG" ]; then
            echo "ERROR: container is running stale image"
            echo "  container: $CONTAINER_IMG"
            echo "  latest:    $LATEST_IMG"
            exit 1
          fi
          echo "OK — container image SHA matches latest: $CONTAINER_IMG"
